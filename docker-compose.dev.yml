# Build from source (local development)
services:
  job-scout:
    build:
      context: .
      target: release
    container_name: job-scout
    restart: unless-stopped
    depends_on:
      job-scout-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://jobscout:jobscout@job-scout-db:5432/jobscout
    ports:
      - "3000:3000"
    networks:
      - job-scout-net

  job-scout-db:
    image: postgres:17-alpine
    container_name: job-scout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobscout
      POSTGRES_PASSWORD: jobscout
      POSTGRES_DB: jobscout
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscout"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job-scout-net

volumes:
  pgdata:

networks:
  job-scout-net:
    driver: bridge
