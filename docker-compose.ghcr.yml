# Use pre-built image from GHCR (no local build).
# On Raspberry Pi: docker compose -f docker-compose.ghcr.yml pull && docker compose -f docker-compose.ghcr.yml up -d

services:
  job-scout-migrate:
    image: ghcr.io/8ix/job-scout:latest
    container_name: job-scout-migrate
    depends_on:
      job-scout-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://jobscout:jobscout@job-scout-db:5432/jobscout
    command: npx prisma migrate deploy
    networks:
      - job-scout-net

  job-scout:
    image: ghcr.io/8ix/job-scout:latest
    container_name: job-scout
    restart: unless-stopped
    depends_on:
      job-scout-db:
        condition: service_healthy
      job-scout-migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://jobscout:jobscout@job-scout-db:5432/jobscout
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - job-scout-net

  job-scout-db:
    image: postgres:17-alpine
    container_name: job-scout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobscout
      POSTGRES_PASSWORD: jobscout
      POSTGRES_DB: jobscout
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscout"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job-scout-net

volumes:
  pgdata:

networks:
  job-scout-net:
    driver: bridge
